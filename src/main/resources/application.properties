spring.application.name=bellru-backend
server.port=8080

# MongoDB - local instance
spring.data.mongodb.uri=mongodb://localhost:27017/bellru

# JWT
app.jwt.secret=ChangeThisSecretBeforeProductionUseAtLeast32Chars
app.jwt.expiration-ms=86400000

# Default admin account (seeded on first run)
app.default-admin-username=admin
app.default-admin-password=admin123

# File uploads
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
